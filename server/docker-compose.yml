name: mth

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mth-postgres
    environment:
      POSTGRES_USER: mth
      POSTGRES_PASSWORD: mth
      POSTGRES_DB: mth
    ports:
      - "5432:5432"
    volumes:
      - mth-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mth -d mth"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: mth-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mthminio
      MINIO_ROOT_PASSWORD: mthminio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mth-minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mth-pgdata:
  mth-minio:
