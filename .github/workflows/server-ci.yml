name: server-ci

on:
  push:
    branches: [main]
    paths: ['server/**', 'packages/shared-domain/**', '.github/workflows/server-ci.yml']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mth
          POSTGRES_PASSWORD: mth
          POSTGRES_DB: mth
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mth -d mth"
          --health-interval 5s --health-timeout 3s --health-retries 20
      minio:
        image: bitnamilegacy/minio:2025.7.23-debian-12-r5@sha256:6dabb4a2088c9a79908de3bc05f4586c23ad2182c8908e7e3acbf61c1467fb20
        env:
          MINIO_ROOT_USER: mthminio
          MINIO_ROOT_PASSWORD: mthminio123
        ports: ['9000:9000']
    env:
      DATABASE_URL: postgres://mth_app:mth_app@localhost:5432/mth
      DATABASE_SERVICE_URL: postgres://mth_service:mth_service@localhost:5432/mth
      DATABASE_ADMIN_URL: postgres://mth:mth@localhost:5432/mth
      JWT_ACCESS_SECRET: ci-only-secret-32-chars-minimum-xxxxx
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: mthminio
      S3_SECRET_KEY: mthminio123
      S3_BUCKET: meal-images
      S3_FORCE_PATH_STYLE: 'true'
      DEMO_MODE: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Lockfiles are generated by npm 11; align CI's npm so strict `npm ci`
      # resolves wasm optional deps (e.g. @emnapi) the same way.
      - run: npm i -g npm@11.6.2
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Deterministic scoring goldens must stay green (no false positives).
      - run: node scripts/eval/run.mjs --offline
      # Tier selection and dataset integrity are zero-token checks.
      - run: node scripts/eval/run-scan-evals.mjs --tier smoke --plan
      - run: node scripts/eval/run-scan-evals.mjs --tier release --seed "$GITHUB_SHA" --plan
      - run: node scripts/eval/run-scan-evals.mjs --tier full --plan
      - run: |
          for shard in 0 1 2 3 4; do
            node scripts/eval/run-scan-evals.mjs --tier nightly --shard-index "$shard" --plan
          done
