name: deploy-production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  preflight:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refuse to deploy a commit that is no longer the main head
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          main_head=$(gh api "repos/$GITHUB_REPOSITORY/branches/main" --jq '.commit.sha')
          if [ "$main_head" != "$GITHUB_SHA" ]; then
            echo "This run targets $GITHUB_SHA but main is now at $main_head." >&2
            echo "Refusing to deploy a stale commit. Dispatch a fresh deploy-production run to deploy the current main head." >&2
            exit 1
          fi

  release-evals:
    if: github.ref == 'refs/heads/main'
    needs: preflight
    uses: ./.github/workflows/scan-evals.yml
    with:
      tier: release
      repeat: '1'
    secrets: inherit

  freshness:
    if: github.ref == 'refs/heads/main'
    needs: release-evals
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify the evaluated commit is still the main head
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          main_head=$(gh api "repos/$GITHUB_REPOSITORY/branches/main" --jq '.commit.sha')
          if [ "$main_head" != "$GITHUB_SHA" ]; then
            echo "This run evaluated $GITHUB_SHA but main is now at $main_head." >&2
            echo "Refusing to deploy a stale commit. The newer main workflow will evaluate and deploy the current head." >&2
            exit 1
          fi

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: freshness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Configure dedicated deployment credential
        env:
          PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$PRIVATE_KEY" > ~/.ssh/mth_deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/mth_deploy ~/.ssh/known_hosts
      - name: Deploy evaluated commit
        env:
          HOST: ${{ vars.PRODUCTION_SSH_HOST }}
          USER: ${{ vars.PRODUCTION_SSH_USER }}
        run: ssh -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/mth_deploy "$USER@$HOST" "deploy $GITHUB_SHA"
      - name: Verify production readiness
        run: |
          curl --fail --silent --show-error --retry 10 --retry-delay 3 --retry-all-errors https://api.mytummyhurts.app/healthz
          curl --fail --silent --show-error --retry 10 --retry-delay 3 --retry-all-errors https://api.mytummyhurts.app/readyz
