# Golden scan-eval deploy gate.
#
# Boots the server from THIS checkout (postgres+minio services, real
# OPENAI_API_KEY, DEMO_MODE deliberately unset so fabricated extractions are
# impossible) and runs the full golden suite against it. A red suite exits 1
# and blocks the calling workflow — this is the safety net prompt/model changes
# must pass through before deploy.
#
# Cost note: a full run is ~130 real image extractions (~$0.50–$1.50 with
# gpt-5.4-mini at repeat 2). Triggered manually or from a deploy workflow via
# workflow_call — never on every push.
#
# Telemetry: with the optional LANGSMITH_API_KEY secret configured, each run
# is also recorded as a LangSmith experiment tagged context=ci-gate (Phase 3b).
name: scan-evals

on:
  workflow_dispatch:
    inputs:
      repeat:
        description: 'Scans per expectation (overrides per-case repeat)'
        required: false
        default: '2'
      cases:
        description: 'Comma-separated case ids (default: all)'
        required: false
        default: ''
  workflow_call:
    secrets:
      OPENAI_API_KEY:
        required: true
      # Optional: when present the run is also recorded as a LangSmith
      # experiment tagged context=ci-gate. Absent -> the runner prints a
      # one-line skip notice and the gate still works.
      LANGSMITH_API_KEY:
        required: false

concurrency:
  group: scan-evals
  cancel-in-progress: false

jobs:
  golden-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mth
          POSTGRES_PASSWORD: mth
          POSTGRES_DB: mth
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mth -d mth"
          --health-interval 5s --health-timeout 3s --health-retries 20
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: mthminio
          MINIO_ROOT_PASSWORD: mthminio123
        ports: ['9000:9000']
    env:
      DATABASE_URL: postgres://mth_app:mth_app@localhost:5432/mth
      DATABASE_SERVICE_URL: postgres://mth_service:mth_service@localhost:5432/mth
      DATABASE_ADMIN_URL: postgres://mth:mth@localhost:5432/mth
      JWT_ACCESS_SECRET: scan-evals-ci-secret-32-chars-min-xxxxx
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: mthminio
      S3_SECRET_KEY: mthminio123
      S3_BUCKET: meal-images
      S3_FORCE_PATH_STYLE: 'true'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # Empty when the secret is not configured — the eval runner then skips
      # LangSmith telemetry with a notice instead of failing (Phase 3b).
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      # Keep the eval server lean and deterministic: no background learning
      # churn, no RAG retrieval cost. DEMO_MODE stays unset on purpose.
      LEARNING_WORKER_ENABLED: 'false'
      MAINTENANCE_ENABLED: 'false'
      PORT: '3000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Lockfiles are generated by npm 11; align CI's npm so strict `npm ci`
      # resolves wasm optional deps (e.g. @emnapi) the same way (server-ci.yml).
      - run: npm i -g npm@11.6.2
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run build
      - name: Start API
        run: |
          node dist/main.js > api.log 2>&1 &
          echo $! > api.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/healthz > /dev/null 2>&1; then
              echo "API is up"; exit 0
            fi
            sleep 2
          done
          echo "API failed to start"; tail -50 api.log; exit 1
      - name: Seed entitled eval user
        # Fresh sign-ups cannot scan (subscription gate in begin_scan_analysis);
        # this entitles a throwaway CI user via the admin DB role.
        run: node scripts/eval/seed-eval-user.mjs --api http://localhost:3000 --email scan-evals@ci.local --password 'Eval-ci-pass-1!'
      - name: Run golden scan suite
        run: |
          CASE_ARG=""
          if [ -n "${{ github.event.inputs.cases }}" ]; then CASE_ARG="--case ${{ github.event.inputs.cases }}"; fi
          node scripts/eval/run-scan-evals.mjs \
            --api http://localhost:3000 \
            --context ci-gate \
            --email scan-evals@ci.local --password 'Eval-ci-pass-1!' \
            --repeat "${{ github.event.inputs.repeat || '2' }}" \
            $CASE_ARG
      - name: Server log tail (on failure)
        if: failure()
        run: tail -200 api.log || true
      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-eval-reports
          path: server/evals/reports/scan-eval-*
          if-no-files-found: ignore
      - name: Stop API
        if: always()
        run: kill "$(cat api.pid)" 2>/dev/null || true
