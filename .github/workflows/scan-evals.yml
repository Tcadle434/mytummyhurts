name: scan-evals

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Evaluation tier'
        required: true
        default: release
        type: choice
        options:
          - smoke
          - release
          - nightly
          - full
      repeat:
        description: 'Optional repeat override'
        required: false
        default: ''
        type: string
      cases:
        description: 'Optional comma-separated case ids'
        required: false
        default: ''
        type: string
      min_pass_ratio:
        description: 'Minimum expectation pass ratio; request failures always block'
        required: false
        default: '1/1'
        type: string
  workflow_call:
    inputs:
      tier:
        description: 'smoke, release, nightly, or full'
        required: false
        default: release
        type: string
      repeat:
        description: 'Optional repeat override'
        required: false
        default: ''
        type: string
      cases:
        description: 'Optional comma-separated case ids'
        required: false
        default: ''
        type: string
      min_pass_ratio:
        description: 'Minimum expectation pass ratio; request failures always block'
        required: false
        default: '1/1'
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true
      LANGSMITH_API_KEY:
        required: false
  schedule:
    - cron: '15 9 * * 1-6'
    - cron: '15 9 * * 0'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-live-evals
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  live-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mth
          POSTGRES_PASSWORD: mth
          POSTGRES_DB: mth
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mth -d mth"
          --health-interval 5s --health-timeout 3s --health-retries 20
      minio:
        image: bitnamilegacy/minio:2025.7.23-debian-12-r5@sha256:6dabb4a2088c9a79908de3bc05f4586c23ad2182c8908e7e3acbf61c1467fb20
        env:
          MINIO_ROOT_USER: mthminio
          MINIO_ROOT_PASSWORD: mthminio123
        ports: ['9000:9000']
    env:
      DATABASE_URL: postgres://mth_app:mth_app@localhost:5432/mth
      DATABASE_SERVICE_URL: postgres://mth_service:mth_service@localhost:5432/mth
      DATABASE_ADMIN_URL: postgres://mth:mth@localhost:5432/mth
      JWT_ACCESS_SECRET: scan-evals-ci-secret-32-chars-min-xxxxx
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: mthminio
      S3_SECRET_KEY: mthminio123
      S3_BUCKET: meal-images
      S3_FORCE_PATH_STYLE: 'true'
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      RAG_RETRIEVAL_ENABLED: 'true'
      RAG_INFLUENCE_ENABLED: 'true'
      SCAN_RISK_ADJUDICATION_ENABLED: 'true'
      # The legacy API eval and the direct concern eval run separately. Avoid
      # paying for an unobserved shadow call during every legacy scan.
      CONCERN_V1_SHADOW_ENABLED: 'off'
      LEARNING_WORKER_ENABLED: 'false'
      MAINTENANCE_ENABLED: 'false'
      PORT: '3000'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i -g npm@11.6.2
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run build
      - name: Resolve tier and budget
        id: plan
        env:
          INPUT_TIER: ${{ inputs.tier }}
          INPUT_REPEAT: ${{ inputs.repeat }}
          INPUT_CASES: ${{ inputs.cases }}
          INPUT_MIN_PASS_RATIO: ${{ inputs.min_pass_ratio }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          tier="${INPUT_TIER:-nightly}"
          context="ci-gate"
          repeat="${INPUT_REPEAT}"
          min_pass_ratio="${INPUT_MIN_PASS_RATIO:-1/1}"
          shard=""
          concern_shard=""
          concern_image_shard=""
          if [ "$SCHEDULE" = "15 9 * * 0" ]; then
            tier="full"
            context="nightly"
          elif [ -n "$SCHEDULE" ]; then
            tier="nightly"
            context="nightly"
          fi
          if [ -z "$repeat" ]; then
            if [ "$tier" = "full" ]; then repeat="2"; else repeat="1"; fi
          fi
          if [ "$tier" = "nightly" ]; then
            day_of_year=$(date -u +%j)
            shard=$((10#$day_of_year % 5))
            concern_shard=$((10#$day_of_year % 4))
            concern_image_shard=$((10#$day_of_year % 2))
          fi
          corpus_tree_sha=$(git rev-parse HEAD:server/data/corpus)
          echo "tier=$tier" >> "$GITHUB_OUTPUT"
          echo "context=$context" >> "$GITHUB_OUTPUT"
          echo "repeat=$repeat" >> "$GITHUB_OUTPUT"
          echo "min_pass_ratio=$min_pass_ratio" >> "$GITHUB_OUTPUT"
          echo "shard=$shard" >> "$GITHUB_OUTPUT"
          echo "concern_shard=$concern_shard" >> "$GITHUB_OUTPUT"
          echo "concern_image_shard=$concern_image_shard" >> "$GITHUB_OUTPUT"
          echo "cases=$INPUT_CASES" >> "$GITHUB_OUTPUT"
          echo "corpus_tree_sha=$corpus_tree_sha" >> "$GITHUB_OUTPUT"
      - name: Print selected evaluation plan
        env:
          TIER: ${{ steps.plan.outputs.tier }}
          SHARD: ${{ steps.plan.outputs.shard }}
          CASES: ${{ steps.plan.outputs.cases }}
        run: |
          args=(--tier "$TIER" --plan --seed "$GITHUB_SHA")
          if [ -n "$SHARD" ]; then args+=(--shard-index "$SHARD"); fi
          if [ -n "$CASES" ]; then args+=(--case "$CASES"); fi
          node scripts/eval/run-scan-evals.mjs "${args[@]}"
      - name: Print selected concern evaluation plans
        env:
          TIER: ${{ steps.plan.outputs.tier }}
          CONCERN_SHARD: ${{ steps.plan.outputs.concern_shard }}
          CONCERN_IMAGE_SHARD: ${{ steps.plan.outputs.concern_image_shard }}
        run: |
          structured_args=(--tier "$TIER" --plan)
          image_args=(--tier "$TIER" --plan)
          if [ -n "$CONCERN_SHARD" ]; then structured_args+=(--shard-index "$CONCERN_SHARD"); fi
          if [ -n "$CONCERN_IMAGE_SHARD" ]; then image_args+=(--shard-index "$CONCERN_IMAGE_SHARD"); fi
          node scripts/eval/run-concern-v1-evals.mjs "${structured_args[@]}"
          node scripts/eval/run-concern-v1-image-evals.mjs "${image_args[@]}"
      - name: Ingest the versioned retrieval corpus
        run: node scripts/rag/ingest-curated.mjs
      - name: Evaluate retrieval quality
        env:
          EVAL_CORPUS_VERSION: ${{ steps.plan.outputs.corpus_tree_sha }}
        run: npm run eval:retrieval
      - name: Start API
        run: |
          node dist/main.js > api.log 2>&1 &
          echo $! > api.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/readyz > /dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          tail -100 api.log
          exit 1
      - name: Seed entitled eval user
        run: node scripts/eval/seed-eval-user.mjs --api http://localhost:3000 --email scan-evals@ci.local --password 'Eval-ci-pass-1!'
      - name: Run live scan evaluations
        env:
          TIER: ${{ steps.plan.outputs.tier }}
          CONTEXT: ${{ steps.plan.outputs.context }}
          REPEAT: ${{ steps.plan.outputs.repeat }}
          MIN_PASS_RATIO: ${{ steps.plan.outputs.min_pass_ratio }}
          SHARD: ${{ steps.plan.outputs.shard }}
          CASES: ${{ steps.plan.outputs.cases }}
          EVAL_CORPUS_VERSION: ${{ steps.plan.outputs.corpus_tree_sha }}
        run: |
          args=(
            --api http://localhost:3000
            --context "$CONTEXT"
            --tier "$TIER"
            --seed "$GITHUB_SHA"
            --repeat "$REPEAT"
            --min-pass-ratio "$MIN_PASS_RATIO"
            --email scan-evals@ci.local
            --password 'Eval-ci-pass-1!'
          )
          if [ -n "$SHARD" ]; then args+=(--shard-index "$SHARD"); fi
          if [ -n "$CASES" ]; then args+=(--case "$CASES"); fi
          node scripts/eval/run-scan-evals.mjs "${args[@]}"
      - name: Run concern transformation evaluations
        env:
          TIER: ${{ steps.plan.outputs.tier }}
          CONCERN_SHARD: ${{ steps.plan.outputs.concern_shard }}
        run: |
          args=(--tier "$TIER")
          if [ -n "$CONCERN_SHARD" ]; then args+=(--shard-index "$CONCERN_SHARD"); fi
          node scripts/eval/run-concern-v1-evals.mjs "${args[@]}"
      - name: Run concern image transformation evaluations
        env:
          TIER: ${{ steps.plan.outputs.tier }}
          CONCERN_IMAGE_SHARD: ${{ steps.plan.outputs.concern_image_shard }}
        run: |
          args=(--tier "$TIER")
          if [ -n "$CONCERN_IMAGE_SHARD" ]; then args+=(--shard-index "$CONCERN_IMAGE_SHARD"); fi
          node scripts/eval/run-concern-v1-image-evals.mjs "${args[@]}"
      - name: Server log tail
        if: failure()
        run: tail -200 api.log || true
      - name: Upload evaluation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-reports-${{ github.run_id }}-${{ github.run_attempt }}
          path: server/evals/reports/*eval-*
          if-no-files-found: ignore
      - name: Stop API
        if: always()
        run: if [ -f api.pid ]; then kill "$(cat api.pid)" 2>/dev/null || true; fi
