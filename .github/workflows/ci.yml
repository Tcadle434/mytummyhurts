name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      # Pin the EXACT npm that generated the lockfile. Node 20 ships npm 10,
      # which mis-resolves wasm optional deps; and a floating `npm@11` broke
      # when 11.18 started demanding @emnapi entries the 11.6-generated
      # lockfile omits. Bump this in lockstep with local npm + a lockfile
      # regen, never independently.
      - run: npm i -g npm@11.6.2
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
