name: Scheduled Maintenance

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke scheduled maintenance worker
        env:
          SCHEDULED_MAINTENANCE_URL: ${{ secrets.SCHEDULED_MAINTENANCE_URL }}
          SCHEDULED_MAINTENANCE_SECRET: ${{ secrets.SCHEDULED_MAINTENANCE_SECRET }}
        run: |
          if [ -z "$SCHEDULED_MAINTENANCE_URL" ] || [ -z "$SCHEDULED_MAINTENANCE_SECRET" ]; then
            echo "Missing scheduled maintenance secrets."
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            -X POST \
            "$SCHEDULED_MAINTENANCE_URL" \
            -H "content-type: application/json" \
            -H "x-maintenance-secret: $SCHEDULED_MAINTENANCE_SECRET" \
            -d '{}'

      - name: Keep hot edge functions warm
        run: |
          BASE="https://nisdwzlvofjkqnbreflk.supabase.co/functions/v1"
          for fn in home-get history-get insights-get scan-get billing-sync notifications-register-token scan-analyze-image scan-analyze-text scan-analyze-barcode daily-report-upsert profile-update learning-recompute; do
            curl -s -o /dev/null -X OPTIONS "$BASE/$fn" &
          done
          wait
          echo "warm pings sent"
